name: Release

# Automatic: push a version tag → official release  (git tag v0.2.0 && git push --tags)
# Manual:    Actions → "Run workflow" on any branch  → draft pre-release for testing
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v0.3.0-beta.1)'
        required: true
        default: 'v0.0.0-test'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS (x86_64)
          - os: macos-latest
            label: macOS (Apple Silicon)
            args: --target aarch64-apple-darwin

    name: Build — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Apple Silicon cross-compile target
          targets: ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Update signing (Ed25519 for tauri-plugin-updater) ────────────
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── Code signing (not currently configured) ──────────────────────
          # macOS notarization and Windows Authenticode signing are not set up.
          # Unsigned builds work fine but may show OS security warnings on first
          # launch (Gatekeeper on macOS, SmartScreen on Windows).
          # Signing may be enabled in a future release if project funding allows.
          # See README.md § "Release Builds & Code Signing" for details.
          # ─────────────────────────────────────────────────────────────────
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseName: 'Glyph Astra ${{ github.event_name == ''workflow_dispatch'' && inputs.version || github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new in this release.

            ---
            **Note — code signing:** These builds are not code-signed. macOS users may see a Gatekeeper warning on first launch; right-click the app and choose **Open** to bypass it. Windows users may see a SmartScreen prompt; click **More info → Run anyway**. Code signing may be introduced in a future release.
          releaseDraft: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          args: ${{ matrix.args }}

  # ── Generate and upload the Tauri updater manifest ────────────────────────
  # Runs after all platform builds finish to aggregate .sig files into latest.json
  update-manifest:
    needs: release
    if: github.event_name == 'push'   # Only for tag-triggered releases, not manual drafts
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Generate latest.json updater manifest
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const version = tag.replace(/^v/, '')

            // Find the release for this tag — getReleaseByTag returns 404 for drafts,
            // so we page through listReleases which includes draft releases.
            let release = null
            for (let page = 1; !release; page++) {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              })
              if (releases.length === 0) break
              release = releases.find(r => r.tag_name === tag) ?? null
            }

            if (!release) {
              core.setFailed(`No release (draft or published) found for tag ${tag}`)
              return
            }

            const assets = release.assets

            // Platform mapping: Tauri platform key → installer filename pattern → sig file pattern
            const platforms = {
              'windows-x86_64': { pattern: /_x64-setup\.nsis\.zip$/, sigPattern: /_x64-setup\.nsis\.zip\.sig$/ },
              'darwin-x86_64':  { pattern: /\.app\.tar\.gz$/, sigPattern: /\.app\.tar\.gz\.sig$/, exclude: /aarch64/ },
              'darwin-aarch64': { pattern: /aarch64.*\.app\.tar\.gz$/, sigPattern: /aarch64.*\.app\.tar\.gz\.sig$/ },
              'linux-x86_64':   { pattern: /\.AppImage\.tar\.gz$/, sigPattern: /\.AppImage\.tar\.gz\.sig$/ },
            }

            const manifest = {
              version,
              notes: `See https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
              pub_date: new Date().toISOString(),
              platforms: {},
            }

            for (const [platform, { pattern, sigPattern, exclude }] of Object.entries(platforms)) {
              const installer = assets.find(a => pattern.test(a.name) && (!exclude || !exclude.test(a.name)))
              const sig = assets.find(a => sigPattern.test(a.name) && (!exclude || !exclude.test(a.name)))

              if (installer && sig) {
                // Download the .sig file content (it's a small text file)
                const sigData = await github.rest.repos.getReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: sig.id,
                  headers: { accept: 'application/octet-stream' },
                })
                const signature = Buffer.from(sigData.data).toString('utf-8').trim()

                manifest.platforms[platform] = {
                  url: installer.browser_download_url,
                  signature,
                }
              }
            }

            if (Object.keys(manifest.platforms).length === 0) {
              core.warning('No signed platform assets found — skipping latest.json upload')
              return
            }

            const content = JSON.stringify(manifest, null, 2)
            core.info(`latest.json:\n${content}`)

            // Upload latest.json as a release asset
            const buf = Buffer.from(content, 'utf-8')
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: buf,
              headers: {
                'content-type': 'application/json',
                'content-length': buf.length,
              },
            })
